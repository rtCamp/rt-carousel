name: Deploy to WordPress.org

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: write

jobs:
  deploy:
    name: Build, Release, and Deploy Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git fetch origin main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "::error::Release tags must point to commits that exist on main."
            exit 1
          fi

      - name: Validate release tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must use numeric format like 1.0.0, not v1.0.0."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies & build assets
        shell: bash
        run: |
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run build

      - name: WordPress Plugin Deploy
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@2.3.0
        with:
          generate-zip: 'true'
          dry-run: ${{ github.ref == 'refs/heads/main' }}
        env:
          SLUG: 'rt-carousel'
          ASSETS_DIR: 'wp-assets'
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          VERSION: '${{ github.ref_name }}'

      - name: Upload Test Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: rt-carousel-${{ github.ref_name }}
          path: ${{ steps.deploy.outputs.zip-path }}

      - name: Upload Release Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.deploy.outputs.zip-path }}
